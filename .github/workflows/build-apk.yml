name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --build-cache --parallel

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: personal-browser-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Signed Release (only runs when keystore secrets are configured) ──
      # To enable: add these secrets in GitHub repo Settings > Secrets:
      #   KEYSTORE_BASE64   - base64 of your .jks file: certutil -encode keystore.jks tmp.b64 && type tmp.b64
      #   KEY_ALIAS         - key alias inside the keystore
      #   KEY_PASSWORD      - key password
      #   STORE_PASSWORD    - keystore password

      - name: Build Release APK
        if: github.event_name == 'push' && secrets.KEYSTORE_BASE64 != ''
        run: ./gradlew assembleRelease --no-daemon --build-cache --parallel

      - name: Sign Release APK
        if: github.event_name == 'push' && secrets.KEYSTORE_BASE64 != ''
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Upload Release APK
        if: github.event_name == 'push' && secrets.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: personal-browser-release
          path: app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 90
