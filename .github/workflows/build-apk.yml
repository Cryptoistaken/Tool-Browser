name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle  # Caches ~/.gradle/caches & wrapper automatically

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Persists Gradle's remote build cache across runs — dramatically speeds
      # up incremental builds by reusing task outputs from previous CI runs.
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Single Gradle invocation: assembleDebug already runs kapt internally.
      # Removed the separate kaptDebugKotlin step to avoid building twice.
      # --configuration-cache: reuses task graph from previous runs (Gradle 8+).
      # --build-cache: reuses task outputs cached from previous runs.
      # --parallel: builds independent modules concurrently.
      # --no-daemon: safe for CI (daemon is useless across ephemeral runners).
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            --parallel \
            --configuration-cache \
            --stacktrace \
            -Dkapt.incremental.apt=true \
            -Dkapt.use.worker.api=true \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g -XX:+UseParallelGC" \
            2>&1 | tee build.log

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: personal-browser-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

